# Zero_Nine Clippy configuration
# Enforces consistent code quality standards across all crates

# Cognitive complexity threshold for functions
cognitive-complexity-threshold = 30

# Maximum number of lines in a function body
too-many-lines-threshold = 100

# Maximum number of arguments in a function
too-many-arguments-threshold = 8

# Minimum characters for abbreviations
min-ident-chars-threshold = 2

# Allow certain patterns used in the codebase
allow-unwrap-in-tests = true
allow-expect-in-tests = true
